<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot Password — Health Tracker</title>
  <link rel="stylesheet" href="/static/css/base.css"/>
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .auth-wrap { width: 100%; max-width: 400px; padding: 1rem; }
    .auth-header { margin-bottom: 2rem; }
    .auth-header h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
    .auth-header p { font-size: 13px; color: var(--text2); margin-top: 6px; font-family: 'DM Mono', monospace; }
    .auth-footer { text-align: center; font-size: 12px; color: var(--text2); margin-top: 1rem; }
    .auth-footer a { color: var(--accent); text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-header">
      <h1>Forgot password</h1>
      <p>Enter your registered email to receive an OTP</p>
    </div>

    <div class="card">
      <div id="error" class="alert alert-danger hidden"></div>
      <div id="success" class="alert alert-success hidden"></div>

      <div class="field">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com" autofocus
          onkeydown="if(event.key==='Enter') sendOTP()"/>
      </div>
      <button class="btn btn-primary" onclick="sendOTP()">Send OTP</button>
    </div>

    <div class="auth-footer">
      <a href="/login">← Back to login</a>
    </div>
  </div>

  <script src="/static/js/api.js"></script>
  <script>
    async function sendOTP() {
      const email = document.getElementById('email').value.trim();
      const errEl = document.getElementById('error');
      const sucEl = document.getElementById('success');
      errEl.classList.add('hidden');
      sucEl.classList.add('hidden');

      if (!email) {
        errEl.textContent = 'Please enter your email.';
        errEl.classList.remove('hidden');
        return;
      }

      try {
        const res = await API.post('/auth/forgot-password', { email });
        sucEl.textContent = res.detail + ' Check your inbox.';
        sucEl.classList.remove('hidden');

        // store email for next step and redirect
        sessionStorage.setItem('reset_email', email);
        setTimeout(() => window.location.href = '/verify-otp', 2000);
      } catch(e) {
        errEl.textContent = e.message;
        errEl.classList.remove('hidden');
      }
    }
  </script>
</body>
</html>
