<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — Health Tracker</title>
  <link rel="stylesheet" href="/static/css/base.css"/>
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .auth-wrap { width: 100%; max-width: 400px; padding: 1rem; }
    .auth-header { margin-bottom: 2rem; }
    .auth-header h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
    .auth-header p { font-size: 13px; color: var(--text2); margin-top: 6px; font-family: 'DM Mono', monospace; }
    .strength-bar { height: 4px; border-radius: 2px; background: var(--border); margin-top: 6px; overflow: hidden; }
    .strength-fill { height: 100%; border-radius: 2px; transition: width 0.3s, background 0.3s; width: 0%; }
    .strength-label { font-size: 11px; color: var(--text3); margin-top: 4px; }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-header">
      <h1>Reset password</h1>
      <p>Choose a new password for your account</p>
    </div>

    <div class="card">
      <div id="error" class="alert alert-danger hidden"></div>
      <div id="success" class="alert alert-success hidden"></div>

      <div class="field">
        <label>New password</label>
        <input type="password" id="password" placeholder="Min 6 characters"
          oninput="checkStrength()" autofocus/>
        <div class="strength-bar">
          <div class="strength-fill" id="strength-fill"></div>
        </div>
        <div class="strength-label" id="strength-label"></div>
      </div>
      <div class="field">
        <label>Confirm password</label>
        <input type="password" id="confirm-password" placeholder="Re-enter password"
          onkeydown="if(event.key==='Enter') resetPassword()"/>
      </div>
      <button class="btn btn-primary" onclick="resetPassword()">Reset password</button>
    </div>
  </div>

  <script src="/static/js/api.js"></script>
  <script>
    const email = sessionStorage.getItem('reset_email');
    if (!email) window.location.href = '/forgot-password';

    function checkStrength() {
      const pw = document.getElementById('password').value;
      const fill = document.getElementById('strength-fill');
      const label = document.getElementById('strength-label');
      let score = 0;
      if (pw.length >= 6) score++;
      if (pw.length >= 10) score++;
      if (/[A-Z]/.test(pw)) score++;
      if (/[0-9]/.test(pw)) score++;
      if (/[^A-Za-z0-9]/.test(pw)) score++;

      const levels = [
        { pct: '20%', color: '#e24b4a', text: 'Very weak' },
        { pct: '40%', color: '#EF9F27', text: 'Weak' },
        { pct: '60%', color: '#EF9F27', text: 'Fair' },
        { pct: '80%', color: '#1D9E75', text: 'Strong' },
        { pct: '100%', color: '#1D9E75', text: 'Very strong' },
      ];
      const level = levels[Math.max(0, score - 1)] || levels[0];
      fill.style.width = pw ? level.pct : '0%';
      fill.style.background = level.color;
      label.textContent = pw ? level.text : '';
      label.style.color = level.color;
    }

    async function resetPassword() {
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm-password').value;
      const errEl = document.getElementById('error');
      const sucEl = document.getElementById('success');
      errEl.classList.add('hidden');
      sucEl.classList.add('hidden');

      if (password.length < 6) {
        errEl.textContent = 'Password must be at least 6 characters.';
        errEl.classList.remove('hidden');
        return;
      }
      if (password !== confirm) {
        errEl.textContent = 'Passwords do not match.';
        errEl.classList.remove('hidden');
        return;
      }

      try {
        await API.post('/auth/reset-password', {
          email,
          otp: '000000', // OTP already verified in previous step
          new_password: password
        });
        sucEl.textContent = 'Password reset successfully. Redirecting to login...';
        sucEl.classList.remove('hidden');
        sessionStorage.removeItem('reset_email');
        setTimeout(() => window.location.href = '/login?reset=1', 2000);
      } catch(e) {
        errEl.textContent = e.message;
        errEl.classList.remove('hidden');
      }
    }
  </script>
</body>
</html>
